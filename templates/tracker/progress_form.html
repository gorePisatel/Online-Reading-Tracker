{% extends 'base.html' %}

{% block title %}Update Progress{% endblock %}

{% block content %}
<div class="form-wrapper">
    <h2>Update Progress</h2>
    <p class="muted-text">{{ progress.book.title }}</p>

    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}
                    <p class="form-error">{{ error }}</p>
                {% endfor %}
            </div>
        {% endfor %}

        <button type="submit" class="btn-accent btn-full form-submit">
            Save Progress
        </button>
    </form>
</div>
{% endblock %}
