{% extends 'base.html' %}

{% block title %}Review {{ book.title }}{% endblock %}

{% block content %}
<div class="form-wrapper">
    <h2>Review {{ book.title }}</h2>

    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}
                    <p class="form-error">{{ error }}</p>
                {% endfor %}
            </div>
        {% endfor %}

        <button type="submit" class="btn-accent btn-full form-submit">
            Save Review
        </button>
    </form>
</div>
{% endblock %}
