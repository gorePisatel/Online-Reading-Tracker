{% extends 'base.html' %}

{% block content %}
<div class="form-wrapper">
    <h2>{% if form.instance.pk %}Edit Book Entry{% else %}Add New Book to Catalog{% endif %}</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
            </div>
        {% endfor %}
        <button type="submit" class="btn-accent" style="width: 100%; border: none; cursor: pointer; margin-top: 10px;">
            Save Book Entry
        </button>
    </form>
</div>
{% endblock %}
