{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="csrf-token" content="{{ csrf_token }}">

        <title>{{ book.title }}</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="{% static 'css/reader.css' %}">
    </head>
    <body>
        <header class="reader-header">
            <a href="{% url 'book_list' %}" class="back-button">← Library</a>

            <div class="reader-title">{{ book.title }}</div>

            <div class="reader-tools">
                <button id="decrease-font" class="tool-btn">-</button>
                <button id="increase-font" class="tool-btn">+</button>
            </div>
        </header>

        <div
            class="reader"
            data-reader
            data-start-page="{{ start_page_index|default:0 }}"
            data-save-progress-url="{% url 'book_reader_progress' book.id %}"
            data-can-save-progress="{% if user.is_authenticated %}true{% else %}false{% endif %}"
        >
            <div class="reader-left" id="left"></div>

            <div class="book">
                <h1 class="book-name">{{ book.title }}</h1>
                <div class="book-author">{{ book.author_name }}</div>

                {% for page in pages %}
                    <div class="page {% if forloop.counter0 == start_page_index %}active{% endif %}">
                        <div class="page-content">
                            {{ page|linebreaks }}
                        </div>

                        <div class="page-number">
                            {{ forloop.counter }} / {{ pages|length }}
                        </div>
                    </div>
                {% endfor %}

                <div id="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </div>

            <div class="reader-right" id="right"></div>
        </div>

        <button class="arrow" id="prev">❮</button>
        <button class="arrow" id="next">❯</button>

        <script src="{% static 'js/reader.js' %}"></script>
    </body>
</html>
