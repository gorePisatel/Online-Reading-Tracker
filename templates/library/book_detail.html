{% extends 'base.html' %}

{% block title %}{{ book.title }}{% endblock %}

{% block content %}

<section class="content-box">

    <div class="book-detail-page">

        <div class="book-detail-left">

            {% if book.cover %}
                <img src="{{ book.cover.url }}"
                     alt="{{ book.title }}"
                     class="book-detail-cover">
            {% else %}
                <div class="book-cover-placeholder book-detail-cover"></div>
            {% endif %}

            <a href="#" class="btn-accent btn-full">
                Читать
            </a>

        </div>

        <div class="book-detail-right">

            <h1>{{ book.title }}</h1>

            <h3>{{ book.author_name }}</h3>

            <p class="book-description">
                {{ book.description }}
            </p>

            {% if user == book.created_by %}
            <div class="book-management-actions">

                <a href="{% url 'book_update' book.id %}"
                   class="btn-accent btn-success">
                    Edit
                </a>

                <a href="{% url 'book_delete' book.id %}"
                   class="btn-accent btn-danger">
                    Delete
                </a>

            </div>
            {% endif %}

        </div>

    </div>

</section>

{% endblock %}
